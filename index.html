<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Pengo Arcade</title>
  <style>
    body{font-family:system-ui;margin:0;background:#111;color:#f5f5f5}
    .wrap{max-width:900px;margin:0 auto;padding:24px}
    h1{margin:0 0 8px;color:#ff8c00}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin-top:18px}
    .card{background:#1b1b1b;border:1px solid #333;border-radius:12px;padding:14px}
    a{color:#7ec8ff;text-decoration:none;font-weight:700}
    p{opacity:.85}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🐧 Pengo Arcade</h1>
    <p>Fun browser games built live. Tap a game to play.</p>
    <div class="grid">
      <div class="card">
        <h3>Longhorn Rush (Desktop)</h3>
        <p>Keyboard arcade version.</p>
        <a href="./longhorn-rush.html">Play now →</a>
      </div>
      <div class="card">
        <h3>Longhorn Rush (Mobile)</h3>
        <p>Touch controls, touchdown mode, crowd chant, full-band vibes.</p>
        <a href="./longhorn-rush-mobile.html">Play now →</a>
      </div>
    </div>
  </div>
</body>
</html>
